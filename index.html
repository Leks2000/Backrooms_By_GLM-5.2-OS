<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backrooms — Уровень B2</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;cursor:none;user-select:none}
#game{display:block;width:100vw;height:100vh;image-rendering:pixelated;image-rendering:crisp-edges}
#cursor{position:fixed;top:50%;left:50%;width:4px;height:4px;background:rgba(255,255,255,0.6);border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:100;box-shadow:0 0 6px rgba(255,255,255,0.3)}
#hud{position:fixed;bottom:20px;left:20px;right:20px;display:none;z-index:50;pointer-events:none}
.hud-row{display:flex;gap:20px;align-items:flex-end;flex-wrap:wrap}
.hud-item{background:rgba(0,0,0,0.65);border:1px solid rgba(255,200,50,0.2);padding:8px 14px;border-radius:4px;color:#c8b870;font-size:13px;letter-spacing:0.5px}
.hud-item span{color:#fff;font-weight:bold}
.hud-item.off span{color:#ff4444}
.hud-item.on span{color:#44ff44}
.hud-item.warn span{color:#ffaa00}
.hud-health{position:fixed;bottom:60px;left:20px;width:200px;height:14px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,200,50,0.2);border-radius:4px;z-index:50;display:none;pointer-events:none;overflow:hidden}
.hud-health-bar{height:100%;width:100%;background:linear-gradient(90deg,#882222,#cc3333);transition:width 0.3s}
.hud-batt{position:fixed;bottom:80px;left:20px;color:#c8b870;font-size:12px;z-index:50;display:none;pointer-events:none;background:rgba(0,0,0,0.6);padding:4px 10px;border-radius:4px}
#interact-prompt{position:fixed;bottom:50%;left:50%;transform:translate(-50%,80px);color:#e8d890;font-size:14px;text-align:center;display:none;z-index:50;pointer-events:none;text-shadow:0 0 10px rgba(0,0,0,0.9);background:rgba(0,0,0,0.5);padding:6px 16px;border-radius:4px;border:1px solid rgba(255,200,50,0.15)}
#doc-ui{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:none;z-index:200;align-items:center;justify-content:center;flex-direction:column}
#doc-ui .doc-frame{background:#1a1810;border:1px solid #3a3520;padding:30px 40px;max-width:500px;color:#c8b870;font-size:14px;line-height:1.7;position:relative;box-shadow:0 0 40px rgba(0,0,0,0.8);white-space:pre-wrap}
#doc-ui .doc-type{font-size:11px;color:#887840;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
#doc-ui .doc-close{position:absolute;top:10px;right:14px;color:#665;cursor:pointer;font-size:18px;pointer-events:all}
#doc-ui .doc-close:hover{color:#aa9955}
#choice-ui{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;z-index:210;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#choice-ui .choice-title{color:#e8d890;font-size:16px;margin-bottom:10px;text-align:center;max-width:420px}
.choice-btn{background:#1a1810;border:1px solid #3a3520;color:#a09060;padding:10px 36px;font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:2px;min-width:160px}
.choice-btn:hover{border-color:#c8a840;color:#e8d890}
#menu{position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0908;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:300;gap:8px}
#menu h1{color:#c8a840;font-size:42px;letter-spacing:6px;margin-bottom:8px;text-shadow:0 0 30px rgba(200,168,64,0.3)}
#menu .subtitle{color:#665830;font-size:13px;letter-spacing:3px;margin-bottom:30px}
.menu-btn{background:none;border:1px solid #332a10;color:#a09060;padding:10px 40px;font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:2px;transition:all 0.2s;min-width:220px;text-align:center}
.menu-btn:hover{border-color:#c8a840;color:#e8d890;background:rgba(200,168,64,0.05)}
.menu-btn.disabled{opacity:0.3;pointer-events:none}
#settings,#controls{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,5,3,0.95);display:none;z-index:310;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#settings h2,#controls h2{color:#c8a840;font-size:22px;letter-spacing:4px;margin-bottom:10px}
.setting-row{display:flex;align-items:center;gap:14px;color:#a09060;font-size:13px}
.setting-row label{min-width:180px;text-align:right}
.setting-row input[type=range]{width:160px;accent-color:#c8a840}
.setting-row .val{min-width:48px;color:#e8d890}
.setting-row input[type=checkbox]{accent-color:#c8a840;width:18px;height:18px}
.ctrl-row{display:flex;gap:30px;color:#a09060;font-size:13px;min-width:340px}
.ctrl-row span:first-child{color:#e8d890;min-width:80px}
#event-flash{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:40;opacity:0;transition:opacity 0.1s}
#damage-vignette{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:45;box-shadow:inset 0 0 120px rgba(80,0,0,0);transition:box-shadow 0.5s}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:99}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,0.15)}
#crosshair::before{width:12px;height:1px;top:0;left:-6px}
#crosshair::after{width:1px;height:12px;top:-6px;left:0}
#stamina{position:fixed;bottom:96px;left:20px;width:200px;height:6px;background:rgba(0,0,0,0.5);border-radius:3px;z-index:50;display:none;overflow:hidden}
#stamina-bar{height:100%;width:100%;background:#c8a840;transition:width 0.2s}
#subtitle{position:fixed;top:62%;left:50%;transform:translateX(-50%);color:#b0b0b0;font-size:13px;z-index:48;display:none;pointer-events:none;text-shadow:0 0 8px #000;background:rgba(0,0,0,0.4);padding:5px 14px;border-radius:4px;text-align:center;max-width:80%}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="cursor"></div>
<div id="crosshair"></div>
<div id="hud">
<div class="hud-row">
<div class="hud-item" id="hud-docs">Документы: <span>0 / 8</span></div>

<div class="hud-item off" id="hud-power">Питание: <span>OFF</span></div>

<div class="hud-item" id="hud-monster">Монстр: <span>???</span></div>
</div>
</div>
<div class="hud-health" id="hud-health"><div class="hud-health-bar" id="hud-health-bar"></div></div>
<div class="hud-batt" id="hud-batt">Батарея фонаря: 100%</div>
<div id="stamina"><div id="stamina-bar"></div></div>
<div id="interact-prompt"></div>

<div id="doc-ui"><div class="doc-frame"><div class="doc-type"></div><div class="doc-text"></div><div class="doc-close">✕</div></div></div>
<div id="choice-ui"><div class="choice-title"></div><button class="choice-btn" data-choice="yes">ДА</button><button class="choice-btn" data-choice="no">НЕТ</button></div>
<div id="menu">
<h1>BACKROOMS</h1>
<div class="subtitle">УРОВЕНЬ B2</div>
<button class="menu-btn" id="btn-continue" style="display:none">ПРОДОЛЖИТЬ</button>

<div id="settings">
<h2>НАСТРОЙКИ</h2>
<div class="setting-row"><label>Чувствительность</label><input type="range" id="s-sens" min="1" max="20" value="5"><span class="val" id="v-sens">5</span></div>
<div class="setting-row"><label>Яркость</label><input type="range" id="s-bright" min="20" max="150" value="80"><span class="val" id="v-bright">80%</span></div>
<div class="setting-row"><label>Громкость</label><input type="range" id="s-vol" min="0" max="100" value="60"><span class="val" id="v-vol">60%</span></div>
<div class="setting-row"><label>Масштаб рендера</label><input type="range" id="s-scale" min="50" max="100" value="100" step="10"><span class="val" id="v-scale">100%</span></div>
<div class="setting-row"><label>Зерно плёнки</label><input type="checkbox" id="s-grain" checked></div>
<div class="setting-row"><label>Виньетка</label><input type="checkbox" id="s-vignette" checked></div>
<div class="setting-row"><label>Хром. аберрация</label><input type="checkbox" id="s-chroma" checked></div>

<h2>УПРАВЛЕНИЕ</h2>

<div class="ctrl-row"><span>SHIFT</span><span>Бег</span></div>
<div class="ctrl-row"><span>CTRL</span><span>Присесть</span></div>
<div class="ctrl-row"><span>E</span><span>Взаимодействие</span></div>
<div class="ctrl-row"><span>F</span><span>Фонарь</span></div>
<div class="ctrl-row"><span>R</span><span>Возродиться</span></div>
<div class="ctrl-row"><span>ESC</span><span>Пауза</span></div>
<div class="ctrl-row"><span>Мышь</span><span>Осмотр</span></div>

<button class="menu-btn" id="btn-controls-back">НАЗАД</button>
</div>
<div id="event-flash"></div>
<div id="damage-vignette"></div>
<script>
// ============================================================
//  BACKROOMS — УРОВЕНЬ B2  |  Улучшенная версия
//  Системы: Renderer / World / Chunk / Entity / Door / Monster
//  Inventory / Objectives / Audio / UI / Lighting / Save
//  Particle / Event / PostProcess
// ============================================================

// ==================== КОНФИГУРАЦИЯ ====================
const CFG = {
    rw: 480, rh: 270,
    texSize: 64,
    chunkSize: 16,
    viewDist: 12,
    fov: 0.66,
    moveSpeed: 2.8,
    runSpeed: 4.5,
    crouchSpeed: 1.6,
    mouseSens: 0.002,
    brightness: 0.8,
    volume: 0.6,
    renderScale: 1.0,
    sens: 5,
    grain: true,
    vignette: true,
    chroma: true,
    flashlightDrain: 0.5,   // % в секунду
    flashlightRange: 9
};

// ==================== УТИЛИТЫ ====================
function hash(x, y) {
    let h = (x * 374761393 + y * 668265263) | 0;
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    return ((h ^ (h >>> 16)) & 0x7fffffff) / 0x7fffffff;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, mn, mx) { return v < mn ? mn : v > mx ? mx : v; }
function dist(x1, y1, x2, y2) { return Math.sqrt((x2-x1)*(x2-x1) + (y2-y1)*(y2-y1)); }
function smoothstep(a, b, t) { t = clamp((t-a)/(b-a), 0, 1); return t*t*(3-2*t); }

function valueNoise(x, y) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const sx = fx * fx * (3 - 2 * fx), sy = fy * fy * (3 - 2 * fy);
    return lerp(lerp(hash(ix, iy), hash(ix+1, iy), sx), lerp(hash(ix, iy+1), hash(ix+1, iy+1), sx), sy);
}
function fbm(x, y, oct) {
    oct = oct || 4;
    let v = 0, a = 1, f = 1, m = 0;
    for (let i = 0; i < oct; i++) { v += valueNoise(x*f, y*f)*a; m += a; a *= 0.5; f *= 2; }
    return v / m;
}

// ==================== ТЕКСТУРЫ ====================
const TS = CFG.texSize;
const textures = {};
function makeTex() { return new Uint8Array(TS * TS * 4); }

function genWallTex() {
    const t = makeTex();
    for (let y = 0; y < TS; y++) for (let x = 0; x < TS; x++) {
        const i = (y*TS+x)*4;
        const n = valueNoise(x*0.25, y*0.25);
        const line = (y % 16 < 1) ? -15 : 0;
        const stain = fbm(x*0.08+5, y*0.08+5, 2) > 0.55 ? -30 : 0;
        t[i]   = clamp(180 + n*25 + line + stain, 0, 255)|0;
        t[i+1] = clamp(165 + n*20 + line + stain, 0, 255)|0;
        t[i+2] = clamp(110 + n*15 + line + stain*0.5, 0, 255)|0;
        t[i+3] = 255;
    }
    return t;
}
function genFloorTex() {
    const t = makeTex();
    for (let y = 0; y < TS; y++) for (let x = 0; x < TS; x++) {
        const i = (y*TS+x)*4;
        const n = valueNoise(x*0.3+50, y*0.3+50);
        const tile = ((x%16<1)||(y%16<1)) ? -20 : 0;
        t[i]   = clamp(60 + n*20 + tile, 0, 255)|0;
        t[i+1] = clamp(55 + n*18 + tile, 0, 255)|0;
        t[i+2] = clamp(48 + n*15 + tile, 0, 255)|0;
        t[i+3] = 255;
    }
    return t;
}
function genCeilTex() {
    const t = makeTex();
    for (let y = 0; y < TS; y++) for (let x = 0; x < TS; x++) {
        const i = (y*TS+x)*4;
        const n = valueNoise(x*0.2+100, y*0.2+100);
        const panel = (x>8&&x<56&&y>8&&y<56) ? 8 : 0;
        t[i]   = clamp(140 + n*15 + panel, 0, 255)|0;
        t[i+1] = clamp(135 + n*14 + panel, 0, 255)|0;
        t[i+2] = clamp(125 + n*12 + panel, 0, 255)|0;
        t[i+3] = 255;
    }
    return t;
}
function genDoorTex(kind) {
    const t = makeTex();
    for (let y = 0; y < TS; y++) for (let x = 0; x < TS; x++) {
        const i = (y*TS+x)*4;
        const n = valueNoise(x*0.35+kind*100, y*0.35+kind*100);
        let r, g, b;
        if (kind === 0) { // офисная
            r = 175 + n*20; g = 150 + n*18; b = 110 + n*14;
            if ((x>4&&x<30&&y>4&&y<30)||(x>34&&x<60&&y>4&&y<30)||(x>4&&x<30&&y>34&&y<60)||(x>34&&x<60&&y>34&&y<60)){r-=25;g-=25;b-=18;}
            if (x<3||x>60||y<3||y>60){r-=40;g-=35;b-=25;}
            if (x>50&&x<58&&y>28&&y<36){r=190;g=175;b=60;}
            if (x>22&&x<42&&y>8&&y<20){r=80;g=90;b=70;}
        } else if (kind === 1) { // металлическая
            r = 100 + n*25; g = 105 + n*25; b = 115 + n*20;
            if (y%16<2){r+=20;g+=20;b+=25;} if (y%16>=14){r-=15;g-=15;b-=10;}
            if ((x%16<3&&y%16<3)||(x%16>12&&y%16<3)){r+=30;g+=30;b+=35;}
            if (x<2||x>61||y<2||y>61){r-=30;g-=30;b-=25;}
            if (x>26&&x<38&&y>44&&y<56){r-=20;g-=20;b-=15;}
        } else if (kind === 2) { // аварийная (красная)
            r = 170 + n*20; g = 40 + n*10; b = 35 + n*10;
            if ((y>14&&y<20)||(y>44&&y<50)){r=220+n*15;g=190+n*15;b=30+n*10; if((x+y)%8<4){r-=80;g-=70;b-=15;}}
            if (x<2||x>61||y<2||y>61){r-=50;g-=15;b-=10;}
            if (x>8&&x<56&&y>28&&y<36){r+=20;g+=20;b+=15;}
            if (x>18&&x<46&&y>5&&y<13){r=200;g=190;b=140;}
        } else { // деревянная/заржавевшая (kind 3)
            r = 120 + n*20; g = 80 + n*15; b = 50 + n*10;
            if (y%12<2){r-=20;g-=15;b-=10;}
            const rust = fbm(x*0.12+700, y*0.12+700, 2);
            if (rust > 0.5){r+=40;g=clamp(g-20,0,255)|0;b-=10;}
            if (x<3||x>60||y<3||y>60){r-=30;g-=25;b-=15;}
            if (x>50&&x<58&&y>28&&y<36){r=150;g=120;b=70;}
        }
        t[i]=clamp(r,0,255)|0; t[i+1]=clamp(g,0,255)|0; t[i+2]=clamp(b,0,255)|0; t[i+3]=255;
    }
    return t;
}
function genExitDoorTex() {
    const t = makeTex();
    for (let y = 0; y < TS; y++) for (let x = 0; x < TS; x++) {
        const i = (y*TS+x)*4;
        const n = valueNoise(x*0.35+900, y*0.35+900);
        let r = 60 + n*15, g = 150 + n*25, b = 70 + n*15;
        if ((y>14&&y<20)||(y>44&&y<50)){r=200+n*15;g=220+n*10;b=30+n*10; if((x+y)%8<4){r-=60;g-=80;b-=15;}}
        if (x<2||x>61||y<2||y>61){r-=20;g-=30;b-=15;}
        if (x>18&&x<46&&y>5&&y<13){r=180;g=220;b=160;}
        t[i]=clamp(r,0,255)|0; t[i+1]=clamp(g,0,255)|0; t[i+2]=clamp(b,0,255)|0; t[i+3]=255;
    }
    return t;
}
function initTextures() {
    textures.wall = genWallTex();
    textures.floor = genFloorTex();
    textures.ceil = genCeilTex();
    textures.doorOffice = genDoorTex(0);
    textures.doorMetal = genDoorTex(1);
    textures.doorEmergency = genDoorTex(2);
    textures.doorWood = genDoorTex(3);
    textures.doorExit = genExitDoorTex();
}
// ==================== МИР / ЧАНКИ ====================
const CHUNK = CFG.chunkSize;
const MAX_CHUNKS = 64;
const chunks = new Map();       // ключ -> Uint8Array(CHUNK*CHUNK)
const chunkDoorSeeds = new Map(); // ключ -> Set door coords (для защиты от дублей)
const chunkRoomTags = new Map();  // ключ -> Map cell->roomTag
const chunkLRU = [];

// Теги особых комнат
const ROOM_TAGS = ['archive','server','storage','medical','kitchen','security','generator','lift','utility'];

function chunkKey(cx, cy) { return cx + ',' + cy; }

// Кэш getCell чтобы не дёргать Map каждый пиксель — не нужен, Map быстрый
function getCell(wx, wy) {
    const cx = Math.floor(wx / CHUNK), cy = Math.floor(wy / CHUNK);
    const ch = chunks.get(chunkKey(cx, cy));
    if (!ch) return 1;
    const lx = ((wx % CHUNK) + CHUNK) % CHUNK;
    const ly = ((wy % CHUNK) + CHUNK) % CHUNK;
    return ch[ly * CHUNK + lx];
}

// Генерация чанка. Структура: коридоры каждые 7 клеток (street grid),
// комнаты 7x7 с дверями на стенах, интерьер по шуму.
// Опасность растёт по прогрессу: больше тупиков / узких коридоров.
function generateChunk(cx, cy) {
    const ch = new Uint8Array(CHUNK * CHUNK);
    const ox = cx * CHUNK, oy = cy * CHUNK;
    const doorsHere = new Set();
    const roomTagsHere = new Map();
    const danger = objectives ? objectives.docsCollected / 8 : 0; // 0..1

    // Стартовый чанк (0,0) — безопасная зона
    const isStart = (cx === 0 && cy === 0);

    for (let y = 0; y < CHUNK; y++) for (let x = 0; x < CHUNK; x++) {
        const wx = ox + x, wy = oy + y;
        const idx = y * CHUNK + x;

        if (isStart && x >= 5 && x <= 10 && y >= 5 && y <= 10) { ch[idx] = 0; continue; }

        const isCorrX = (wx % 7 === 0);
        const isCorrY = (wy % 7 === 0);

        if (isCorrX || isCorrY) {
            ch[idx] = 0;
            // Узкие коридоры на поздних этапах: случайно ставим стену-перегородку в коридоре
            if (danger > 0.6 && !isStart && hash(wx*7+1, wy*13+3) < 0.06) ch[idx] = 1;
            continue;
        }

        const lx = wx % 7, ly = wy % 7;

        // Стены комнат
        if (lx === 0 || lx === 6 || ly === 0 || ly === 6) {
            const h = hash(wx * 7 + 31, wy * 13 + 47);
            // Дверь только на "проходных" стыках (рядом с коридором)
            const nearCorr = (lx === 0 && isCorrY) || (ly === 0 && isCorrX) ||
                             (lx === 6 && (wy+1)%7===0) || (ly === 6 && (wx+1)%7===0);
            if (h < 0.22 && nearCorr) {
                const dh = hash(wx * 3 + 7, wy * 5 + 11);
                let dt;
                if (dh < 0.35) dt = 2;        // офисная
                else if (dh < 0.65) dt = 3;   // металлическая
                else if (dh < 0.82) dt = 4;   // аварийная
                else dt = 5;                  // деревянная
                ch[idx] = dt;
                doorsHere.add(wx + ',' + wy);
            } else {
                ch[idx] = 1;
            }
            continue;
        }

        // Интерьер комнаты
        let n = fbm(wx * 0.13 + 77, wy * 0.13 + 77, 3);
        // Тупики: на поздних этапах больше стен внутри
        if (danger > 0.3) n += 0.08 * danger;
        // Аварийный режим после генератора: перегородки
        if (objectives && objectives.powerOn) n += 0.1;
        ch[idx] = n > 0.52 ? 1 : 0;
    }

    // Особые комнаты: один спецкомнатный блок на чанк (кроме стартового)
    if (!isStart) {
        const rx = 2 + Math.floor(hash(cx*5+1, cy*9+2) * 10);
        const ry = 2 + Math.floor(hash(cx*7+3, cy*3+5) * 10);
        const tag = ROOM_TAGS[Math.floor(hash(cx*11+1, cy*13+7) * ROOM_TAGS.length)];
        // Вырезаем комнату 3x3
        for (let yy = 0; yy < 4; yy++) for (let xx = 0; xx < 4; xx++) {
            const px = rx + xx, py = ry + yy;
            if (px < 0 || px >= CHUNK || py < 0 || py >= CHUNK) continue;
            const idx = py * CHUNK + px;
            if (xx === 0 || xx === 3 || yy === 0 || yy === 3) ch[idx] = 1; // стены
            else { ch[idx] = 0; roomTagsHere.set((ox+px)+','+(oy+py), tag); }
        }
        // Дверь в спецкомнату
        const doorSide = Math.floor(hash(cx*17+2, cy*19+3) * 4);
        let dwx = ox + rx, dwy = oy + ry;
        if (doorSide === 0) dwx += 1;       // низ
        else if (doorSide === 1) dwx += 2;  // верх? упростим — ставим в нижней стене
        else if (doorSide === 2) dwy += 1;
        else dwy += 2;
        // Гарантируем что клетка — стена и рядом коридор
        const lx = ((dwx % CHUNK) + CHUNK) % CHUNK;
        const ly = ((dwy % CHUNK) + CHUNK) % CHUNK;
        const curIdx = ly * CHUNK + lx;
        if (ch[curIdx] === 1) {
            ch[curIdx] = 3; // металлическая дверь в спецкомнату
            doorsHere.add(dwx + ',' + dwy);
        }
    }

    chunkDoorSeeds.set(chunkKey(cx, cy), doorsHere);
    chunkRoomTags.set(chunkKey(cx, cy), roomTagsHere);
    return ch;
}

// Получить тег комнаты для клетки
function getRoomTag(wx, wy) {
    const cx = Math.floor(wx / CHUNK), cy = Math.floor(wy / CHUNK);
    const tags = chunkRoomTags.get(chunkKey(cx, cy));
    if (!tags) return null;
    return tags.get(wx + ',' + wy) || null;
}

function ensureChunkAt(wx, wy) {
    const cx = Math.floor(wx / CHUNK), cy = Math.floor(wy / CHUNK);
    const k = chunkKey(cx, cy);
    if (chunks.has(k)) return;
    chunks.set(k, generateChunk(cx, cy));
    const ds = chunkDoorSeeds.get(k);
    if (ds) for (const dk of ds) if (!doors.has(dk)) doors.set(dk, createDoor(dk));
    chunkLRU.push(k);
}

function ensureChunks(px, py) {
    const pcx = Math.floor(px / CHUNK), pcy = Math.floor(py / CHUNK);
    const needed = new Set();
    for (let dy = -2; dy <= 2; dy++) for (let dx = -2; dx <= 2; dx++) {
        const cx = pcx + dx, cy = pcy + dy;
        const k = chunkKey(cx, cy);
        needed.add(k);
        if (!chunks.has(k)) {
            chunks.set(k, generateChunk(cx, cy));
            // Создаём двери этого чанка (если ещё нет)
            const ds = chunkDoorSeeds.get(k);
            if (ds) for (const dk of ds) if (!doors.has(dk)) doors.set(dk, createDoor(dk));
            chunkLRU.push(k);
        }
    }
    // Выгрузка далёких чанков + их дверей
    while (chunkLRU.length > MAX_CHUNKS) {
        const old = chunkLRU.shift();
        if (needed.has(old)) { chunkLRU.push(old); continue; }
        chunks.delete(old);
        const ds = chunkDoorSeeds.get(old);
        if (ds) { for (const dk of ds) doors.delete(dk); chunkDoorSeeds.delete(old); }
        chunkRoomTags.delete(old);
    }
}

const doors = new Map();
// cell: 2 офисная, 3 металлическая, 4 аварийная, 5 деревянная, 6 выход (зелёная)
const DOOR_TYPES = {
    2: { name: 'Офисная дверь', speed: 0.6, sound: 'wood', tex: 'doorOffice' },
    3: { name: 'Металлическая дверь', speed: 0.3, sound: 'metal', tex: 'doorMetal' },
    4: { name: 'Аварийная дверь', speed: 0.9, sound: 'alarm', tex: 'doorEmergency' },
    5: { name: 'Деревянная дверь', speed: 0.5, sound: 'wood', tex: 'doorWood' },
    6: { name: 'Выход', speed: 0.7, sound: 'metal', tex: 'doorExit' }
};

function createDoor(dk) {
    const parts = dk.split(',');
    const wx = parseInt(parts[0]), wy = parseInt(parts[1]);
    const cell = getCell(wx, wy);
    const dt = DOOR_TYPES[cell] || DOOR_TYPES[2];
    return {
        wx: wx, wy: wy, type: cell,
        openAmount: 0, opening: false, closing: false,
        locked: (cell === 3 && hash(wx+500, wy+500) < 0.15), // некоторые металлические заперты
        jammed: hash(wx + 500, wy + 500) < 0.06,
        slamTimer: 0,
        interacted: false
    };
}

function updateDoors(dt) {
    for (const [k, d] of doors) {
        const dtInfo = DOOR_TYPES[d.type] || DOOR_TYPES[2];
        const spd = dtInfo.speed * dt;
        if (d.opening) {
            d.openAmount = Math.min(1, d.openAmount + spd);
            if (d.openAmount >= 1) d.opening = false;
        } else if (d.closing) {
            d.openAmount = Math.max(0, d.openAmount - spd);
            if (d.openAmount <= 0) d.closing = false;
        }
        // Двери могут сами хлопать после 6 документов (событие)
        if (d.slamTimer > 0) {
            d.slamTimer -= dt;
            if (d.slamTimer <= 0 && d.openAmount > 0 && !d.jammed) {
                d.closing = true; d.opening = false;
                playSound('door_slam');
            }
        }
    }
}

function interactDoor(d) {
    if (d.jammed) return 'Заклинило.';
    if (d.locked && player.keys <= 0) return 'Требуется ключ.';
    if (d.locked) {
        d.locked = false; player.keys--;
        showPrompt('Ключ использован. Дверь отперта.');
        playSound('metal_open');
    }
    if (d.openAmount > 0 && d.openAmount < 1) {
        d.closing = true; d.opening = false;
        playSound((DOOR_TYPES[d.type]||DOOR_TYPES[2]).sound + '_close');
        return null;
    }
    if (d.openAmount >= 1) {
        d.closing = true; d.opening = false;
        playSound((DOOR_TYPES[d.type]||DOOR_TYPES[2]).sound + '_close');
        return null;
    }
    // Двери с выбором — аварийные иногда спрашивают
    if (d.type === 4 && !d.interacted && hash(d.wx+90, d.wy+90) < 0.3 && gameState === 'playing') {
        showDoorChoice(d, 'Аварийная дверь. Открыть? Сработает сирена.');
        return null;
    }
    d.opening = true; d.closing = false; d.interacted = true;
    playSound((DOOR_TYPES[d.type]||DOOR_TYPES[2]).sound + '_open');
    return null;
}

function canWalk(x, y) {
    const r = 0.22;
    for (let dy = -r; dy <= r; dy += r * 2) for (let dx = -r; dx <= r; dx += r * 2) {
        const wx = Math.floor(x + dx), wy = Math.floor(y + dy);
        const c = getCell(wx, wy);
        if (c === 1) return false;
        if (c >= 2 && c <= 6) {
            const d = doors.get(wx + ',' + wy);
            if (!d || d.openAmount < 0.75) return false;
        }
    }
    return true;
}

function showDoorChoice(d, text) {
    const ui = document.getElementById('choice-ui');
    ui.querySelector('.choice-title').textContent = text;
    ui.dataset.door = d.wx + ',' + d.wy;
    ui.style.display = 'flex';
    gameState = 'choosing';
}

function findSpawnPos(sx, sy) {
    for (let r = 0; r < 40; r++) {
        for (let a = 0; a < 16; a++) {
            const wx = sx + Math.cos(a * 0.3927) * r;
            const wy = sy + Math.sin(a * 0.3927) * r;
            const fx = Math.floor(wx), fy = Math.floor(wy);
            // Подгружаем чанк в точке поиска, иначе getCell вернёт стену
            ensureChunkAt(fx, fy);
            if (getCell(fx, fy) === 0) {
                // убедимся что не в стене и не слишком близко к старту
                if (dist(wx, wy, 7.5, 7.5) > 4) return { x: wx + 0.5, y: wy + 0.5 };
            }
        }
    }
    return null;
}

// Спавн предметов вокруг старта (в пределах 2 чанков — гарантированно в LRU)
function spawnWorldItems() {
    items.length = 0;
    // Кольцевой спавн: детерминированные точки вокруг (7.5,7.5), радиус 4..30
    function ringPos(seedIdx, minR, maxR) {
        const ang = hash(seedIdx*13+1, seedIdx*7+3) * Math.PI * 2;
        const rad = minR + hash(seedIdx*5+9, seedIdx*11+2) * (maxR - minR);
        const sx = 7.5 + Math.cos(ang) * rad;
        const sy = 7.5 + Math.sin(ang) * rad;
        return findSpawnPos(sx, sy);
    }
    // 8 документов
    for (let i = 0; i < 8; i++) { const pos = ringPos(i, 6, 30); if (pos) items.push({ x: pos.x, y: pos.y, type: 'doc', id: i, collected: false }); }
    // 3 детали генератора
    for (let i = 0; i < 3; i++) { const pos = ringPos(10 + i, 10, 30); if (pos) items.push({ x: pos.x, y: pos.y, type: 'genPart', id: i, collected: false }); }
    for (let i = 0; i < 12; i++) { const pos = ringPos(20 + i, 4, 30); if(pos) items.push({x:pos.x,y:pos.y,type:'battery',id:i,collected:false}); }
    for (let i = 0; i < 4; i++)  { const pos = ringPos(40 + i, 8, 30); if(pos) items.push({x:pos.x,y:pos.y,type:'key',id:i,collected:false}); }
    for (let i = 0; i < 6; i++)  { const pos = ringPos(50 + i, 5, 30); if(pos) items.push({x:pos.x,y:pos.y,type:'pill',id:i,collected:false}); }
    for (let i = 0; i < 3; i++)  { const pos = ringPos(60 + i, 8, 28); if(pos) items.push({x:pos.x,y:pos.y,type:'map',id:i,collected:false}); }
    for (let i = 0; i < 4; i++)  { const pos = ringPos(70 + i, 6, 30); if(pos) items.push({x:pos.x,y:pos.y,type:'photo',id:i,collected:false}); }
    for (let i = 0; i < 3; i++)  { const pos = ringPos(80 + i, 7, 30); if(pos) items.push({x:pos.x,y:pos.y,type:'tool',id:i,collected:false}); }
}

const player = {
    x: 7.5, y: 7.5, angle: 0, pitch: 0,
    health: 100, running: false, crouching: false,
    flashlightOn: true, flashBattery: 100,
    batteries: 0, keys: 0, pills: 0, maps: 0, tools: 0,
    bobPhase: 0, bobAmount: 0, headBob: 0, crouchLerp: 0,
    footstepTimer: 0, stamina: 1.0,
    _lookAtDoor: null, _lookAtDist: 100, _lookAtCell: 1,
    _lookItem: null, _lookGen: false, _lookLift: false
};
const input = { forward:false, back:false, left:false, right:false, sprint:false, crouch:false, interact:false, flashlight:false };
let mouseDX = 0, mouseDY = 0;

function updatePlayer(dt) {
    // Вращение
    const sensMul = (CFG.sens || 5) / 5;
    player.angle += mouseDX * CFG.mouseSens * sensMul;
    player.pitch = clamp(player.pitch - mouseDY * CFG.mouseSens * sensMul, -0.5, 0.5);
    mouseDX = 0; mouseDY = 0;

    // Приседание плавное
    player.crouching = input.crouch;
    player.crouchLerp = lerp(player.crouchLerp, player.crouching ? 1 : 0, dt * 8);

    // Выносливость
    const wantRun = input.sprint && input.forward && player.stamina > 0.05 && !player.crouching;
    if (wantRun) player.stamina = Math.max(0, player.stamina - dt * 0.35);
    else player.stamina = Math.min(1, player.stamina + dt * 0.25);

    const baseSpeed = wantRun ? CFG.runSpeed : (player.crouching ? CFG.crouchSpeed : CFG.moveSpeed);
    const speed = baseSpeed * dt;
    player.running = wantRun && (input.forward||input.back||input.left||input.right);

    let dx = 0, dy = 0;
    if (input.forward) { dx += Math.cos(player.angle)*speed; dy += Math.sin(player.angle)*speed; }
    if (input.back)    { dx -= Math.cos(player.angle)*speed; dy -= Math.sin(player.angle)*speed; }
    if (input.left)    { dx += Math.cos(player.angle-1.5708)*speed; dy += Math.sin(player.angle-1.5708)*speed; }
    if (input.right)   { dx += Math.cos(player.angle+1.5708)*speed; dy += Math.sin(player.angle+1.5708)*speed; }

    if (canWalk(player.x + dx, player.y)) player.x += dx;
    if (canWalk(player.x, player.y + dy)) player.y += dy;

    // Head bob
    const moving = Math.abs(dx)+Math.abs(dy) > 0.001;
    if (moving) {
        const bobSpeed = player.running ? 12 : (player.crouching ? 6 : 8);
        player.bobPhase += dt * bobSpeed;
        player.bobAmount = lerp(player.bobAmount, player.running?0.06:(player.crouching?0.02:0.03), dt*5);
        player.footstepTimer -= dt * (player.running?1.6:1.0);
        if (player.footstepTimer <= 0) { playPositionalSound('step', player.x, player.y, player.running); player.footstepTimer = player.running?0.32:0.45; }
    } else {
        player.bobAmount = lerp(player.bobAmount, 0, dt*5);
    }
    player.headBob = Math.sin(player.bobPhase) * player.bobAmount;

    // Фонарь — батарея
    if (player.flashlightOn) {
        player.flashBattery -= dt * CFG.flashlightDrain;
        if (player.flashBattery <= 0) { player.flashBattery = 0; player.flashlightOn = false; }
    }

    // Подбор предметов
    for (const item of items) {
        if (item.collected) continue;
        if (dist(player.x, player.y, item.x, item.y) < 0.7) {
            item.collected = true;
            if (item.type === 'doc') { readDocument(item); }
            else if (item.type === 'genPart') { objectives.genParts++; showPrompt('Деталь генератора ('+objectives.genParts+'/3)'); playSound('pickup'); }
            else if (item.type === 'battery') { player.batteries++; player.flashBattery = Math.min(100, player.flashBattery+35); showPrompt('Батарейка (+заряд фонаря)'); playSound('pickup'); }
            else if (item.type === 'key')     { player.keys++; showPrompt('Ключ подобран'); playSound('pickup'); }
            else if (item.type === 'pill')    { player.pills++; player.health = Math.min(100, player.health+25); showPrompt('Таблетки (+здоровье)'); playSound('pickup'); }
            else if (item.type === 'map')     { player.maps++; showPrompt('Карта местности'); playSound('pickup'); }
            else if (item.type === 'photo')   { showPrompt('Старая фотография...'); playSound('pickup'); }
            else if (item.type === 'tool')    { player.tools++; showPrompt('Инструмент'); playSound('pickup'); }
            updateHUD(); saveGame();
        }
    }

    // Использование таблетки (H)
    // обработано в keydown

    // Генератор
    if (dist(player.x, player.y, generator.x, generator.y) < 1.5 && !generator.active) {
        if (input.interact) {
            if (objectives.genParts >= 3) {
                generator.active = true; objectives.powerOn = true;
                showPrompt('Питание восстановлено!'); playSound('generator_on');
                triggerEvent('power_on'); onProgressChanged(); updateHUD(); saveGame();
            } else {
                showPrompt('Нужно '+objectives.genParts+'/3 деталей');
            }
        }
    }
    // Лифт
    if (dist(player.x, player.y, elevator.x, elevator.y) < 1.5) {
        if (objectives.powerOn && !elevator.finalPhase && input.interact) {
            elevator.finalPhase = true; elevator.timer = 18;
            showPrompt('Лифт вызван! Держитесь!'); playSound('elevator_call');
            startFinalPhase();
        } else if (!objectives.powerOn && input.interact) {
            showPrompt('Лифт заблокирован. Нет питания.');
        }
    }

    // Финальная фаза
    if (elevator.finalPhase) {
        elevator.timer -= dt;
        if (elevator.timer <= 0 && !elevator.active) { elevator.active = true; gameState = 'won'; saveGame(); }
    }

    input.interact = false;
}

// ==================== A* PATHFINDING ====================
// Простая сетка A* с обходом стен и дверей. Ограниченный радиус для производительности.
function astar(sx, sy, tx, ty, maxNodes) {
    maxNodes = maxNodes || 400;
    const start = { x: Math.floor(sx), y: Math.floor(sy) };
    const goal = { x: Math.floor(tx), y: Math.floor(ty) };
    if (start.x === goal.x && start.y === goal.y) return [{x:start.x,y:start.y}];

    const open = [];
    const cameFrom = new Map();
    const gScore = new Map();
    const key = (n) => n.x + ',' + n.y;
    const h = (n) => Math.abs(n.x-goal.x) + Math.abs(n.y-goal.y);

    const sk = key(start);
    gScore.set(sk, 0);
    open.push({ x: start.x, y: start.y, f: h(start) });
    let visited = 0;

    while (open.length > 0 && visited < maxNodes) {
        // найти минимальный f
        let bi = 0;
        for (let i = 1; i < open.length; i++) if (open[i].f < open[bi].f) bi = i;
        const cur = open.splice(bi, 1)[0];
        const ck = key(cur);
        visited++;
        if (cur.x === goal.x && cur.y === goal.y) {
            // восстановить путь
            const path = [{x:cur.x,y:cur.y}];
            let k = ck;
            while (cameFrom.has(k)) {
                const p = cameFrom.get(k);
                path.unshift({x:p.x,y:p.y});
                k = key(p);
            }
            return path;
        }
        // соседи
        const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
        for (const [dx,dy] of dirs) {
            const nx = cur.x+dx, ny = cur.y+dy;
            const c = getCell(nx, ny);
            if (c === 1) continue;
            // двери проходимы если открыты
            if (c >= 2 && c <= 6) { const d = doors.get(nx+','+ny); if (!d || d.openAmount < 0.75) continue; }
            const nk = nx+','+ny;
            const tentG = (gScore.get(ck)||0) + 1;
            if (tentG < (gScore.get(nk) || Infinity)) {
                cameFrom.set(nk, {x:cur.x,y:cur.y});
                gScore.set(nk, tentG);
                open.push({ x:nx, y:ny, f: tentG + h({x:nx,y:ny}) });
            }
        }
    }
    return null; // путь не найден
}

// ==================== МОНСТР ====================
const monster = {
    x: 25, y: 25, angle: 0,
    state: 'idle', // idle, heard, searching, near, chasing, lost
    speed: 1.5, stateTimer: 0,
    heardPos: null, lastKnownX: 0, lastKnownY: 0,
    patrolTarget: null, path: null, pathIdx: 0, pathTimer: 0,
    alertLevel: 0, canOpenDoors: false,
    reactsToFlashlight: false, reactsToRunning: false,
    growlTimer: 0
};

function hasLineOfSight(x1, y1, x2, y2) {
    const d = dist(x1, y1, x2, y2);
    const steps = Math.ceil(d * 3);
    for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const cx = Math.floor(lerp(x1, x2, t));
        const cy = Math.floor(lerp(y1, y2, t));
        const c = getCell(cx, cy);
        if (c === 1) return false;
        if (c >= 2 && c <= 6) { const door = doors.get(cx+','+cy); if (door && door.openAmount < 0.5) return false; }
    }
    return true;
}

function moveMonsterAlongPath(speed, dt) {
    if (!monster.path || monster.pathIdx >= monster.path.length) return false;
    const node = monster.path[monster.pathIdx];
    const tx = node.x + 0.5, ty = node.y + 0.5;
    const dx = tx - monster.x, dy = ty - monster.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 0.3) { monster.pathIdx++; return true; }
    monster.angle = Math.atan2(dy, dx);
    const step = Math.min(d, speed * dt);
    const nx = monster.x + (dx/d) * step;
    const ny = monster.y + (dy/d) * step;
    // Коллизия для монстра (может открывать двери)
    const mcx = Math.floor(nx), mcy = Math.floor(ny);
    const c = getCell(mcx, mcy);
    if (c === 0) { monster.x = nx; monster.y = ny; }
    else if (c >= 2 && c <= 6) {
        const door = doors.get(mcx+','+mcy);
        if (door && door.openAmount >= 0.75) { monster.x = nx; monster.y = ny; }
        else if (monster.canOpenDoors) { door.opening = true; door.closing = false; }
    } else {
        // пробуем по одной оси
        if (getCell(Math.floor(nx), Math.floor(monster.y)) === 0) monster.x = nx;
        else if (getCell(Math.floor(monster.x), Math.floor(ny)) === 0) monster.y = ny;
    }
    return true;
}

function updateMonster(dt) {
    const d = dist(monster.x, monster.y, player.x, player.y);
    monster.alertLevel = Math.min(1, objectives.docsCollected / 8);
    monster.speed = 1.5 + monster.alertLevel * 1.4 + (elevator.finalPhase ? 1.0 : 0);
    monster.canOpenDoors = objectives.docsCollected >= 6 || elevator.finalPhase;
    monster.reactsToFlashlight = objectives.docsCollected >= 3;
    monster.reactsToRunning = objectives.docsCollected >= 4;

    let hearDist = 6;
    if (player.running) hearDist = monster.reactsToRunning ? 16 : 11;
    if (player.flashlightOn && monster.reactsToFlashlight) hearDist = Math.max(hearDist, 13);
    if (player.crouching) hearDist *= 0.5;

    const canSee = d < 22 && hasLineOfSight(monster.x, monster.y, player.x, player.y);
    const canHear = d < hearDist;
    monster.stateTimer -= dt;
    monster.growlTimer -= dt;

    switch (monster.state) {
        case 'idle':
            if (canSee) { monster.state='chasing'; monster.stateTimer=8; break; }
            if (canHear) { monster.state='heard'; monster.stateTimer=5; monster.heardPos={x:player.x,y:player.y}; break; }
            if (!monster.patrolTarget || dist(monster.x,monster.y,monster.patrolTarget.x,monster.patrolTarget.y)<1.5) {
                const a = Math.random()*Math.PI*2, r = 6+Math.random()*14;
                monster.patrolTarget = { x: monster.x+Math.cos(a)*r, y: monster.y+Math.sin(a)*r };
                monster.path = null; monster.pathIdx = 0;
            }
            monster.pathTimer -= dt;
            if (monster.pathTimer <= 0 || !monster.path) {
                monster.path = astar(monster.x, monster.y, monster.patrolTarget.x, monster.patrolTarget.y, 200);
                monster.pathIdx = 0; monster.pathTimer = 2;
            }
            moveMonsterAlongPath(monster.speed*0.4, dt);
            break;
        case 'heard':
            if (canSee) { monster.state='chasing'; monster.stateTimer=8; break; }
            if (monster.heardPos) {
                monster.pathTimer -= dt;
                if (monster.pathTimer <= 0) { monster.path = astar(monster.x,monster.y,monster.heardPos.x,monster.heardPos.y,250); monster.pathIdx=0; monster.pathTimer=1.5; }
                moveMonsterAlongPath(monster.speed*0.7, dt);
                if (dist(monster.x,monster.y,monster.heardPos.x,monster.heardPos.y) < 1.2) { monster.state='searching'; monster.stateTimer=6; }
            }
            if (monster.stateTimer <= 0) { monster.state='searching'; monster.stateTimer=6; }
            break;
        case 'searching':
            if (canSee) { monster.state='chasing'; monster.stateTimer=8; break; }
            if (canHear) { monster.state='heard'; monster.stateTimer=5; monster.heardPos={x:player.x,y:player.y}; break; }
            monster.pathTimer -= dt;
            if (monster.pathTimer <= 0) { monster.path = astar(monster.x,monster.y,monster.lastKnownX,monster.lastKnownY,250); monster.pathIdx=0; monster.pathTimer=2; }
            moveMonsterAlongPath(monster.speed*0.55, dt);
            if (monster.stateTimer <= 0) monster.state = 'lost';
            break;
        case 'near':
            if (canSee) { monster.state='chasing'; monster.stateTimer=8; break; }
            monster.state='searching'; monster.stateTimer=5;
            break;
        case 'chasing':
            monster.lastKnownX = player.x; monster.lastKnownY = player.y;
            monster.pathTimer -= dt;
            if (monster.pathTimer <= 0) { monster.path = astar(monster.x,monster.y,player.x,player.y,350); monster.pathIdx=0; monster.pathTimer=0.6; }
            moveMonsterAlongPath(monster.speed, dt);
            // Прямое преследование при LOS — быстрее и точнее
            if (canSee) {
                const dx = player.x-monster.x, dy = player.y-monster.y, dd=Math.sqrt(dx*dx+dy*dy);
                if (dd > 0.01) {
                    monster.angle = Math.atan2(dy,dx);
                    const step = Math.min(dd, monster.speed*dt);
                    const nx = monster.x + (dx/dd)*step, ny = monster.y + (dy/dd)*step;
                    const c = getCell(Math.floor(nx),Math.floor(ny));
                    if (c === 0) { monster.x=nx; monster.y=ny; }
                    else if (c>=2&&c<=6){ const dr=doors.get(Math.floor(nx)+','+Math.floor(ny)); if(dr&&dr.openAmount>=0.75){monster.x=nx;monster.y=ny;} else if(monster.canOpenDoors){dr.opening=true;dr.closing=false;} }
                }
                monster.stateTimer = 8;
            } else {
                monster.stateTimer -= dt;
                if (monster.stateTimer <= 0) monster.state = 'searching';
            }
            if (d < 0.8) {
                player.health -= 32 * dt;
                document.getElementById('damage-vignette').style.boxShadow = 'inset 0 0 120px rgba(80,0,0,0.7)';
                if (player.health <= 0) { player.health = 0; gameState = 'dead'; }
            } else {
                document.getElementById('damage-vignette').style.boxShadow = 'inset 0 0 120px rgba(80,0,0,0)';
            }
            break;
        case 'lost':
            if (canSee) { monster.state='chasing'; monster.stateTimer=8; break; }
            if (canHear) { monster.state='heard'; monster.stateTimer=5; monster.heardPos={x:player.x,y:player.y}; break; }
            monster.stateTimer -= dt;
            if (monster.stateTimer <= 0) { monster.state='idle'; monster.path=null; }
            break;
    }

    // Звук монстра — позиционный, слышен раньше чем виден
    if (d < 14 && (monster.state==='chasing'||monster.state==='near'||monster.state==='heard')) {
        if (monster.growlTimer <= 0) { playPositionalSound('monster_growl', monster.x, monster.y, false); monster.growlTimer = 1.5 + Math.random()*2; }
    }
    if (d < 8 && monster.state==='chasing') {
        if (Math.random() < dt * 1.5) playPositionalSound('monster_step', monster.x, monster.y, true);
    }

    // HUD
    const stateNames = { idle: '???', heard: '!?', searching: 'Ищет...', near: 'РЯДОМ', chasing: 'ПОГОНЯ', lost: '???' };
    const mh = document.getElementById('hud-monster');
    mh.querySelector('span').textContent = stateNames[monster.state] || '???';
    mh.className = 'hud-item' + (monster.state==='chasing' ? ' off' : (monster.state==='near' ? ' warn' : ''));
}
// ==================== РЕНДЕРЕР ====================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let rw, rh, imgData, buf, zBuffer;

function initRenderer() {
    rw = Math.max(120, Math.floor(CFG.rw * CFG.renderScale));
    rh = Math.max(68, Math.floor(CFG.rh * CFG.renderScale));
    canvas.width = rw; canvas.height = rh;
    imgData = ctx.createImageData(rw, rh);
    buf = new Uint8ClampedArray(rw * rh * 4);
    zBuffer = new Float32Array(rw); // пересоздаём при смене масштаба — фикс бага
}

function render() {
    const w = rw, h = rh;
    const halfH = h / 2;
    const dirX = Math.cos(player.angle), dirY = Math.sin(player.angle);
    const planeX = -dirY * CFG.fov, planeY = dirX * CFG.fov;
    const pitchOff = player.pitch * h + player.headBob * h;
    const crouchOff = player.crouchLerp * h * 0.08;

    // Потолок и пол
    for (let y = 0; y < h; y++) {
        const isFloor = y > halfH + pitchOff + crouchOff;
        const isCeil = y < halfH + pitchOff + crouchOff;
        if (!isFloor && !isCeil) continue;
        const rowDist = isFloor ? h / (2.0 * (y - halfH - pitchOff - crouchOff)) : h / (2.0 * (halfH + pitchOff + crouchOff - y));
        if (rowDist < 0.1 || rowDist > CFG.viewDist * 1.5) continue;
        const floorStepX = rowDist * planeX * 2 / w;
        const floorStepY = rowDist * planeY * 2 / w;
        let fX = player.x + rowDist * (dirX - planeX);
        let fY = player.y + rowDist * (dirY - planeY);
        const tex = isFloor ? textures.floor : textures.ceil;
        const shade = isFloor ? 0.7 : 0.9;
        for (let x = 0; x < w; x++) {
            const tx = ((Math.floor(fX) % TS) + TS) % TS;
            const ty = ((Math.floor(fY) % TS) + TS) % TS;
            const ti = (ty * TS + tx) * 4;
            let r = tex[ti], g = tex[ti+1], b = tex[ti+2];
            let light = shade * CFG.brightness * Math.max(0, 1 - rowDist / CFG.viewDist);
            // Фонарик
            if (player.flashlightOn && player.flashBattery > 0) {
                const ra = Math.atan2(fY - player.y, fX - player.x) - player.angle;
                let ra2 = ra; while(ra2>Math.PI)ra2-=Math.PI*2; while(ra2<-Math.PI)ra2+=Math.PI*2;
                if (Math.abs(ra2) < 0.35) light += (1-Math.abs(ra2)/0.35)*0.8*Math.max(0,1-rowDist/CFG.flashlightRange);
            }
            // Аварийный красный свет когда нет питания
            if (!objectives.powerOn) light *= 0.5;
            else light *= 0.8;
            light = clamp(light, 0, 1.5);
            // Туман
            const fog = Math.max(0, 1 - rowDist / (CFG.viewDist*1.1));
            r *= fog; g *= fog; b *= fog;
            const idx = (y*w+x)*4;
            buf[idx]=clamp(r*light,0,255)|0; buf[idx+1]=clamp(g*light,0,255)|0; buf[idx+2]=clamp(b*light,0,255)|0; buf[idx+3]=255;
            fX += floorStepX; fY += floorStepY;
        }
    }

    // Стены (DDA)
    for (let x = 0; x < w; x++) {
        const cameraX = 2*x/w - 1;
        const rayDirX = dirX + planeX*cameraX;
        const rayDirY = dirY + planeY*cameraX;
        let mapX = Math.floor(player.x), mapY = Math.floor(player.y);
        const ddx = Math.abs(1/(rayDirX||1e-10));
        const ddy = Math.abs(1/(rayDirY||1e-10));
        let stepX, stepY, sideDistX, sideDistY;
        if (rayDirX<0){stepX=-1;sideDistX=(player.x-mapX)*ddx;}else{stepX=1;sideDistX=(mapX+1-player.x)*ddx;}
        if (rayDirY<0){stepY=-1;sideDistY=(player.y-mapY)*ddy;}else{stepY=1;sideDistY=(mapY+1-player.y)*ddy;}
        let hit=false, side=0, isDoor=false, doorRef=null, doorTexX=0, wallCell=1, steps=0;
        while(!hit && steps<60){
            steps++;
            if(sideDistX<sideDistY){sideDistX+=ddx;mapX+=stepX;side=0;}else{sideDistY+=ddy;mapY+=stepY;side=1;}
            const cell=getCell(mapX,mapY);
            if(cell===1){hit=true;wallCell=1;}
            else if(cell>=2&&cell<=6){
                const d=doors.get(mapX+','+mapY);
                if(d&&d.openAmount<1.0){
                    let perpD = side===0 ? (mapX-player.x+(1-stepX)/2)/rayDirX : (mapY-player.y+(1-stepY)/2)/rayDirY;
                    perpD = Math.abs(perpD);
                    let hitPos = side===0 ? player.y+perpD*rayDirY : player.x+perpD*rayDirX;
                    hitPos = hitPos - Math.floor(hitPos);
                    const panelEnd = 1.0 - d.openAmount;
                    if(hitPos < panelEnd && panelEnd > 0.01){ hit=true; isDoor=true; doorRef=d; wallCell=cell; doorTexX=clamp(Math.floor((hitPos/panelEnd)*(TS-1)),0,TS-1); }
                }
            }
        }
        if(!hit){zBuffer[x]=100;continue;}
        let perpWallDist = side===0 ? (mapX-player.x+(1-stepX)/2)/rayDirX : (mapY-player.y+(1-stepY)/2)/rayDirY;
        perpWallDist = Math.abs(perpWallDist);
        zBuffer[x] = perpWallDist;
        const lineH = Math.floor(h/perpWallDist);
        let drawStart = Math.max(0, Math.floor(-lineH/2+halfH+pitchOff+crouchOff));
        let drawEnd = Math.min(h-1, Math.floor(lineH/2+halfH+pitchOff+crouchOff));
        let texX;
        if(isDoor){ texX = doorTexX; }
        else {
            let wallX = side===0 ? player.y+perpWallDist*rayDirY : player.x+perpWallDist*rayDirX;
            wallX -= Math.floor(wallX);
            texX = clamp(Math.floor(wallX*TS),0,TS-1);
        }
        let tex;
        if(isDoor){ const ti=(DOOR_TYPES[wallCell]||DOOR_TYPES[2]).tex; tex=textures[ti]; }
        else tex = textures.wall;
        let light = CFG.brightness;
        if(side===1) light*=0.75;
        light *= Math.max(0, 1 - perpWallDist/CFG.viewDist);
        if(player.flashlightOn && player.flashBattery>0){
            const wa = Math.atan2(player.y+rayDirY*perpWallDist-player.y, player.x+rayDirX*perpWallDist-player.x) - player.angle;
            let wa2=wa; while(wa2>Math.PI)wa2-=Math.PI*2; while(wa2<-Math.PI)wa2+=Math.PI*2;
            if(Math.abs(wa2)<0.3) light += (1-Math.abs(wa2)/0.3)*0.6*Math.max(0,1-perpWallDist/7);
        }
        if(!objectives.powerOn) light *= 0.55;
        else light *= 0.8;
        // Мигание ламп при питании
        if(objectives.powerOn && perpWallDist<6){ light *= 0.93 + Math.sin(performance.now()*0.01+mapX*3+mapY*7)*0.07; }
        // Аварийный красный свет
        if(!objectives.powerOn && perpWallDist<5){ light *= 0.7; }
        light = clamp(light, 0, 1.5);
        const fog = Math.max(0, 1 - perpWallDist/(CFG.viewDist*1.1));
        light *= fog;
        for(let y=drawStart; y<=drawEnd; y++){
            const dd = y-(halfH+pitchOff+crouchOff)+lineH/2;
            const ty = clamp(Math.floor((dd/lineH)*TS),0,TS-1);
            const ti = (ty*TS+texX)*4;
            const idx=(y*w+x)*4;
            buf[idx]=clamp(tex[ti]*light,0,255)|0; buf[idx+1]=clamp(tex[ti+1]*light,0,255)|0; buf[idx+2]=clamp(tex[ti+2]*light,0,255)|0; buf[idx+3]=255;
        }
        if(x===Math.floor(w/2)){
            player._lookAtDoor = isDoor ? doorRef : null;
            player._lookAtDist = perpWallDist;
            player._lookAtCell = wallCell;
        }
    }

    renderSprites(w, h, halfH, pitchOff+crouchOff, dirX, dirY, planeX, planeY);
    renderParticles(w, h, halfH, pitchOff+crouchOff, dirX, dirY, planeX, planeY);

    if(CFG.grain) applyGrain(w,h);
    if(CFG.vignette) applyVignette(w,h);
    if(CFG.chroma) applyChroma(w,h);

    imgData.data.set(buf);
    ctx.putImageData(imgData, 0, 0);
}

// ==================== СПРАЙТЫ ====================
function renderSprites(w, h, halfH, pitchOff, dirX, dirY, planeX, planeY) {
    const list = [];
    for(const item of items){
        if(item.collected) continue;
        const d = dist(player.x,player.y,item.x,item.y);
        if(d>CFG.viewDist||d<0.3) continue;
        if(!hasLineOfSight(player.x,player.y,item.x,item.y)) continue;
        list.push({x:item.x,y:item.y,d,type:'item',ref:item});
    }
    if(!generator.active){ const gd=dist(player.x,player.y,generator.x,generator.y); if(gd<CFG.viewDist) list.push({x:generator.x,y:generator.y,d:gd,type:'gen'}); }
    const ed=dist(player.x,player.y,elevator.x,elevator.y); if(ed<CFG.viewDist) list.push({x:elevator.x,y:elevator.y,d:ed,type:'lift'});
    const md=dist(player.x,player.y,monster.x,monster.y); if(md<CFG.viewDist) list.push({x:monster.x,y:monster.y,d:md,type:'monster'});
    list.sort((a,b)=>b.d-a.d);
    const invDet = 1.0/(planeX*dirY - dirX*planeY);
    for(const spr of list){
        const sx=spr.x-player.x, sy=spr.y-player.y;
        const tX=invDet*(dirY*sx-dirX*sy);
        const tY=invDet*(-planeY*sx+planeX*sy);
        if(tY<=0.1) continue;
        const sprScreenX=Math.floor((w/2)*(1+tX/tY));
        let sprH, sprW, color, alpha;
        if(spr.type==='item'){ sprH=Math.abs(Math.floor(h/tY*0.3)); sprW=sprH; color=ITEM_TYPES[spr.ref.type]?ITEM_TYPES[spr.ref.type].color:[200,200,200]; alpha=Math.max(0,1-spr.d/CFG.viewDist); }
        else if(spr.type==='gen'){ sprH=Math.abs(Math.floor(h/tY*0.7)); sprW=sprH*0.8; color=objectives.genParts>=3?[100,200,100]:[150,150,150]; alpha=Math.max(0,1-spr.d/CFG.viewDist); }
        else if(spr.type==='lift'){ sprH=Math.abs(Math.floor(h/tY*0.8)); sprW=sprH*0.6; color=objectives.powerOn?[80,200,80]:[100,100,100]; alpha=Math.max(0,1-spr.d/CFG.viewDist); }
        else { sprH=Math.abs(Math.floor(h/tY*0.9)); sprW=sprH*0.5; color=[20,15,15]; alpha=Math.max(0,1-spr.d/(CFG.viewDist*0.6)); if(monster.state==='chasing'||monster.state==='near'){color=[40,10,10];alpha=Math.min(1,alpha+0.3);} }
        const dSY=Math.max(0,Math.floor(-sprH/2+halfH+pitchOff));
        const dEY=Math.min(h-1,Math.floor(sprH/2+halfH+pitchOff));
        const dSX=Math.max(0,Math.floor(sprScreenX-sprW/2));
        const dEX=Math.min(w-1,Math.floor(sprScreenX+sprW/2));
        let light=CFG.brightness*Math.max(0,1-spr.d/CFG.viewDist);
        if(!objectives.powerOn) light*=0.55; else light*=0.8;
        if(player.flashlightOn&&player.flashBattery>0){
            const ma=Math.atan2(spr.y-player.y,spr.x-player.x)-player.angle; let maa=ma; while(maa>Math.PI)maa-=Math.PI*2; while(maa<-Math.PI)maa+=Math.PI*2;
            if(Math.abs(maa)<0.3) light+=0.4*(1-Math.abs(maa)/0.3);
        }
        light=clamp(light,0,1.5);
        for(let y=dSY;y<=dEY;y++) for(let x=dSX;x<=dEX;x++){
            if(tY>=zBuffer[x]) continue;
            const nx=(x-(sprScreenX-sprW/2))/sprW;
            const ny=(y-dSY)/(dEY-dSY+1);
            let draw=false;
            if(spr.type==='monster'){
                const cx=nx-0.5, cy=ny;
                if(cy>0.1&&cy<1.0){ const bw=0.2+(cy<0.4?cy/0.4*0.3:(1-(cy-0.4)/0.6)*0.3); if(Math.abs(cx)<bw) draw=true; }
                if(cy>0.2&&cy<0.35&&(Math.abs(cx-0.08)<0.05||Math.abs(cx+0.08)<0.05)){draw=true;color=[200,30,30];}
            } else {
                if(nx>0.1&&nx<0.9&&ny>0.05&&ny<0.95) draw=true;
            }
            if(!draw) continue;
            const idx=(y*w+x)*4;
            const a=alpha*light;
            buf[idx]=clamp(buf[idx]+color[0]*a*0.5,0,255)|0;
            buf[idx+1]=clamp(buf[idx+1]+color[1]*a*0.5,0,255)|0;
            buf[idx+2]=clamp(buf[idx+2]+color[2]*a*0.5,0,255)|0;
        }
        // Запоминаем предмет в центре для подсказки
        if(spr.type==='item' && Math.abs(sprScreenX-w/2)<sprW/2 && tY<3.0){ player._lookItem = spr.ref; }
        else if(spr.type==='item') { /* не сбрасываем тут */ }
        if(spr.type==='gen' && Math.abs(sprScreenX-w/2)<sprW/2 && tY<2.5) player._lookGen = true;
        if(spr.type==='lift'&& Math.abs(sprScreenX-w/2)<sprW/2 && tY<2.5) player._lookLift = true;
    }
}

// ==================== ЧАСТИЦЫ (РЕНДЕР) ====================
function renderParticles(w, h, halfH, pitchOff, dirX, dirY, planeX, planeY) {
    const invDet = 1.0/(planeX*dirY - dirX*planeY);
    for(const p of particles){
        const d = dist(player.x, player.y, p.x, p.y);
        if(d > CFG.viewDist || d < 0.3) continue;
        if(!hasLineOfSight(player.x, player.y, p.x, p.y)) continue;
        const sx = p.x - player.x, sy = p.y - player.y;
        const tX = invDet*(dirY*sx - dirX*sy);
        const tY = invDet*(-planeY*sx + planeX*sy);
        if(tY <= 0.1) continue;
        const screenX = Math.floor((w/2)*(1 + tX/tY));
        const screenY = Math.floor(halfH + pitchOff);
        if(screenX < 0 || screenX >= w || screenY < 0 || screenY >= h) continue;
        if(tY >= zBuffer[screenX]) continue;
        // Размер пылинки ~1-2 пикселя, яркость зависит от близости и жизни
        const fade = clamp(p.life / 6, 0, 1);
        const distFade = Math.max(0, 1 - d / CFG.viewDist);
        let light = CFG.brightness * distFade;
        if(player.flashlightOn && player.flashBattery > 0){
            const ma = Math.atan2(p.y - player.y, p.x - player.x) - player.angle;
            let maa = ma; while(maa > Math.PI) maa -= Math.PI*2; while(maa < -Math.PI) maa += Math.PI*2;
            if(Math.abs(maa) < 0.35) light += 0.5*(1 - Math.abs(maa)/0.35);
        }
        light = clamp(light, 0, 1.5);
        const a = fade * distFade * 0.6;
        const px = screenX, py = screenY + Math.floor((Math.sin(p.x*7+p.y*3)*0.5)*h/tY*0.05);
        if(px >= 0 && px < w && py >= 0 && py < h){
            const idx = (py*w + px)*4;
            const v = 180 * a * light;
            buf[idx]   = clamp(buf[idx]   + v, 0, 255)|0;
            buf[idx+1] = clamp(buf[idx+1] + v*0.95, 0, 255)|0;
            buf[idx+2] = clamp(buf[idx+2] + v*0.85, 0, 255)|0;
        }
    }
}

// ==================== ПОСТОБРАБОТКА ====================
function applyGrain(w,h){
    for(let i=0;i<w*h*4;i+=4){
        const n=(Math.random()-0.5)*16;
        buf[i]=clamp(buf[i]+n,0,255)|0; buf[i+1]=clamp(buf[i+1]+n,0,255)|0; buf[i+2]=clamp(buf[i+2]+n,0,255)|0;
    }
}
function applyVignette(w,h){
    const cx=w/2, cy=h/2, maxD=Math.sqrt(cx*cx+cy*cy);
    for(let y=0;y<h;y+=2) for(let x=0;x<w;x+=2){
        const d=Math.sqrt((x-cx)*(x-cx)+(y-cy)*(y-cy))/maxD;
        const v=1-d*d*0.75;
        const idx=(y*w+x)*4;
        buf[idx]=clamp(buf[idx]*v,0,255)|0; buf[idx+1]=clamp(buf[idx+1]*v,0,255)|0; buf[idx+2]=clamp(buf[idx+2]*v,0,255)|0;
        if(x+1<w){const i2=idx+4;buf[i2]=buf[idx];buf[i2+1]=buf[idx+1];buf[i2+2]=buf[idx+2];}
        if(y+1<h){const i2=idx+w*4;buf[i2]=buf[idx];buf[i2+1]=buf[idx+1];buf[i2+2]=buf[idx+2];}
        if(x+1<w&&y+1<h){const i2=idx+w*4+4;buf[i2]=buf[idx];buf[i2+1]=buf[idx+1];buf[i2+2]=buf[idx+2];}
    }
}
function applyChroma(w,h){
    const shift=2;
    for(let y=0;y<h;y++) for(let x=0;x<w;x++){
        const idx=(y*w+x)*4;
        const rx=Math.min(w-1,x+shift), bx=Math.max(0,x-shift);
        buf[idx]=buf[(y*w+rx)*4]; buf[idx+2]=buf[(y*w+bx)*4+2];
    }
}

let audioCtx = null;
const audioNodes = {};

function initAudio() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return; }
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.type='sine'; osc.frequency.value=55; gain.gain.value=0.03*CFG.volume;
    osc.connect(gain); gain.connect(audioCtx.destination); osc.start();
    audioNodes.hum={osc,gain};
    const osc2=audioCtx.createOscillator(), gain2=audioCtx.createGain();
    osc2.type='sine'; osc2.frequency.value=82; gain2.gain.value=0.015*CFG.volume;
    osc2.connect(gain2); gain2.connect(audioCtx.destination); osc2.start();
    audioNodes.hum2={osc:osc2,gain:gain2};
    // Шум вентиляции
    const noiseBuf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
    const nd=noiseBuf.getChannelData(0);
    for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*0.5;
    const nsrc=audioCtx.createBufferSource(); nsrc.buffer=noiseBuf; nsrc.loop=true;
    const ng=audioCtx.createGain(); ng.gain.value=0.008*CFG.volume;
    const nf=audioCtx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=300;
    nsrc.connect(nf); nf.connect(ng); ng.connect(audioCtx.destination); nsrc.start();
    audioNodes.vent={src:nsrc,gain:ng};
}

function playSound(type) {
    if(!audioCtx) return;
    const now=audioCtx.currentTime, vol=CFG.volume;
    if(type==='step'){ const b=audioCtx.createBuffer(1,audioCtx.sampleRate*0.08,audioCtx.sampleRate); const d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.15)); const s=audioCtx.createBufferSource(); s.buffer=b; const g=audioCtx.createGain(); g.gain.value=0.08*vol; const f=audioCtx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=800+Math.random()*400; s.connect(f); f.connect(g); g.connect(audioCtx.destination); s.start(now); }
    else if(type==='wood_open'){playNoiseBurst(0.15,400,0.12*vol);setTimeout(()=>playNoiseBurst(0.08,300,0.06*vol),100);}
    else if(type==='wood_close'){playNoiseBurst(0.1,500,0.1*vol);}
    else if(type==='metal_open'){playNoiseBurst(0.4,200,0.18*vol);playTone(180,0.3,0.04*vol);}
    else if(type==='metal_close'){playNoiseBurst(0.25,300,0.15*vol);playTone(120,0.2,0.03*vol);}
    else if(type==='alarm_open'){playNoiseBurst(0.08,600,0.1*vol);playTone(880,0.1,0.06*vol);setTimeout(()=>playTone(880,0.1,0.06*vol),150);}
    else if(type==='alarm_close'){playNoiseBurst(0.06,500,0.08*vol);}
    else if(type==='pickup'){playTone(600,0.08,0.06*vol);setTimeout(()=>playTone(900,0.1,0.05*vol),80);}
    else if(type==='generator_on'){playNoiseBurst(0.5,150,0.15*vol);playTone(60,1.0,0.08*vol);setTimeout(()=>playTone(80,0.5,0.06*vol),500);}
    else if(type==='elevator_call'){playTone(300,0.3,0.08*vol);setTimeout(()=>playTone(400,0.3,0.08*vol),300);setTimeout(()=>playTone(500,0.5,0.08*vol),600);}
    else if(type==='event_sound'){playNoiseBurst(0.2,1000,0.1*vol);playTone(200+Math.random()*300,0.5,0.04*vol);}
    else if(type==='door_slam'){playNoiseBurst(0.15,250,0.2*vol);}
    else if(type==='monster_growl'){playNoiseBurst(0.6,100,0.12*vol);playTone(50+Math.random()*30,0.8,0.06*vol);}
    else if(type==='monster_step'){playNoiseBurst(0.12,150,0.05*vol);}
    else if(type==='phone'){playTone(440,0.1,0.1*vol);setTimeout(()=>playTone(440,0.1,0.1*vol),200);}
    else if(type==='drip'){playTone(800+Math.random()*400,0.05,0.03*vol);}
    else if(type==='pipe'){playTone(120,0.3,0.02*vol);}
}
function playPositionalSound(type,sx,sy,isLoud){
    if(!audioCtx) return;
    const d=dist(player.x,player.y,sx,sy);
    const maxR=isLoud?20:14;
    if(d>maxR) return;
    const pan=clamp((sx-player.x)/maxR,-1,1);
    const vol=clamp(1-d/maxR,0,1)*CFG.volume;
    if(type==='step'||type==='monster_step'){ playNoiseBurst(0.1,200,0.06*vol); }
    else if(type==='monster_growl'){ playNoiseBurst(0.6,100,0.1*vol); playTone(50+Math.random()*30,0.8,0.05*vol); }
    else playSound(type);
}
function playNoiseBurst(duration,freq,vol){
    if(!audioCtx) return;
    const now=audioCtx.currentTime;
    const b=audioCtx.createBuffer(1,audioCtx.sampleRate*duration,audioCtx.sampleRate);
    const d=b.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));
    const s=audioCtx.createBufferSource(); s.buffer=b;
    const g=audioCtx.createGain(); g.gain.value=vol;
    const f=audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=2;
    s.connect(f); f.connect(g); g.connect(audioCtx.destination); s.start(now);
}
function playTone(freq,duration,vol){
    if(!audioCtx) return;
    const now=audioCtx.currentTime;
    const o=audioCtx.createOscillator(), g=audioCtx.createGain();
    o.type='sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,now); g.gain.exponentialRampToValueAtTime(0.001,now+duration);
    o.connect(g); g.connect(audioCtx.destination); o.start(now); o.stop(now+duration);
}

let ambientTimer=0;
function updateAmbient(dt){
    ambientTimer-=dt;
    if(ambientTimer<=0){

}

function updateEvents(dt){
    eventCooldown-=dt;
    if(activeTrigger){ triggerTimer-=dt; if(triggerTimer<=0){executeTrigger(activeTrigger); activeTrigger=null;} }
    if(eventCooldown<=0){
        // Опасность влияет на частоту
        const danger = (objectives.docsCollected/8) + (elevator.finalPhase?0.5:0);
        eventCooldown = (180-danger*60) + Math.random()*80;
        const evt=EVENTS[Math.floor(Math.random()*EVENTS.length)];
        evt.action();
        // После 6 документов — двери могут закрываться сами
        if(objectives.docsCollected>=6 && Math.random()<0.3){
            for(const [k,d] of doors){ if(d.openAmount>0.3 && !d.jammed && dist(player.x,player.y,d.wx,d.wy)>4 && dist(player.x,player.y,d.wx,d.wy)<18){ d.slamTimer=1+Math.random()*2; break; } }
        }
    }
}
function executeTrigger(trigger){
    switch(trigger){
        case 'look_back': showSubtitle('Вам стало не по себе... Не оглядывайтесь.',4000); break;
        case 'lights_out': triggerEvent('flicker'); showSubtitle('Свет моргнул...',3000); break;

        case 'flashlight': showSubtitle('Он не любит свет. Используйте фонарь.',4000); break;
        case 'door_slam': playSound('door_slam'); showSubtitle('ГДЕ-ТО ХЛОПНУЛА ДВЕРЬ!',4000); break;
        case 'red_doors': showSubtitle('Красные двери — его территория.',4000); break;
    }
}
function triggerEvent(type){

const particles=[];
function updateParticles(dt){
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
        if(p.life<=0) particles.splice(i,1);
    }
    if(Math.random()<0.1){ particles.push({x:player.x+(Math.random()-0.5)*6,y:player.y+(Math.random()-0.5)*6,vx:(Math.random()-0.5)*0.1,vy:(Math.random()-0.5)*0.1,life:3+Math.random()*3}); }
}

        player:{x:player.x,y:player.y,angle:player.angle,health:player.health,flashBattery:player.flashBattery,batteries:player.batteries,keys:player.keys,pills:player.pills,maps:player.maps,tools:player.tools,stamina:player.stamina},
        objectives:{...objectives},
        docsRead:[...docReadFlags],
        items:items.filter(i=>i.collected).map(i=>i.type+'_'+i.id),
        elevator:{finalPhase:elevator.finalPhase,timer:elevator.timer,active:elevator.active,x:elevator.x,y:elevator.y},
        generator:{active:generator.active,x:generator.x,y:generator.y},
        monster:{x:monster.x,y:monster.y,state:monster.state},
        settings:{sens:CFG.sens,bright:CFG.brightness,vol:CFG.volume,scale:CFG.renderScale,grain:CFG.grain,vignette:CFG.vignette,chroma:CFG.chroma}
    };
    try{localStorage.setItem('backrooms_b2_save',JSON.stringify(data));}catch(e){}

function loadGame(){
    if(!loadGameRaw()) return false;
    applySettingsFromSave();
    return true;
}
function loadGameRaw(){
    try{
        const raw=localStorage.getItem('backrooms_b2_save');
        if(!raw) return false;
        const data=JSON.parse(raw);
        Object.assign(player,data.player);
        Object.assign(objectives,data.objectives);
        docReadFlags=new Set(data.docsRead||[]);
        if(data.items){ for(const key of data.items){ const [type,id]=key.split('_'); const item=items.find(i=>i.type===type&&i.id==id); if(item) item.collected=true; } }
        if(data.elevator) Object.assign(elevator,data.elevator);
        if(data.generator) Object.assign(generator,data.generator);
        if(data.monster){ monster.x=data.monster.x; monster.y=data.monster.y; monster.state=data.monster.state; }
        _savedSettings = data.settings || null;
        return true;
    }catch(e){ return false; }
}
function applySettingsFromSave(){
    const s=_savedSettings; if(!s) return;
    CFG.sens=s.sens||5; CFG.brightness=s.bright||0.8; CFG.volume=s.vol||0.6; CFG.renderScale=s.scale||1.0; CFG.grain=s.grain!==false; CFG.vignette=s.vignette!==false; CFG.chroma=s.chroma!==false; applySettingsToUI(); initRenderer();
}

    if(gameState==='won'){
        ctx.fillStyle='rgba(0,10,0,0.9)'; ctx.fillRect(0,0,rw,rh);
        ctx.fillStyle='#44cc44'; ctx.font='28px "Courier New"'; ctx.textAlign='center';
        ctx.fillText('ВЫ ВЫЖИЛИ',rw/2,rh/2-10);
        ctx.fillStyle='#668866'; ctx.font='14px "Courier New"';
        ctx.fillText('Лифт увозит вас наверх...',rw/2,rh/2+25);
    }
}
function applySettingsToUI(){
    document.getElementById('s-sens').value=CFG.sens; document.getElementById('v-sens').textContent=CFG.sens;
    document.getElementById('s-bright').value=Math.round(CFG.brightness*100); document.getElementById('v-bright').textContent=Math.round(CFG.brightness*100)+'%';
    document.getElementById('s-vol').value=Math.round(CFG.volume*100); document.getElementById('v-vol').textContent=Math.round(CFG.volume*100)+'%';
    document.getElementById('s-scale').value=Math.round(CFG.renderScale*100); document.getElementById('v-scale').textContent=Math.round(CFG.renderScale*100)+'%';
    document.getElementById('s-grain').checked=CFG.grain; document.getElementById('s-vignette').checked=CFG.vignette; document.getElementById('s-chroma').checked=CFG.chroma;
}
// ==================== ВВОД ====================
document.addEventListener('keydown', e => {
    // ESC обрабатываем в любом состоянии (пауза/возобновление)
    if(e.code==='Escape'){
        if(gameState==='playing'){
            gameState='paused';
            document.getElementById('menu').style.display='flex';
            document.getElementById('btn-continue').style.display='block';
            if(document.exitPointerLock) document.exitPointerLock();
        } else if(gameState==='paused'){
            gameState='playing';
            document.getElementById('menu').style.display='none';
            canvas.requestPointerLock();
        }
        return;
    }
    // Закрытие документа/выбора клавишей E или ESC-подобными
    if(gameState!=='playing') return;
    switch(e.code){
        case 'KeyW': case 'ArrowUp': input.forward=true; break;
        case 'KeyS': case 'ArrowDown': input.back=true; break;
        case 'KeyA': case 'ArrowLeft': input.left=true; break;
        case 'KeyD': case 'ArrowRight': input.right=true; break;
        case 'ShiftLeft': case 'ShiftRight': input.sprint=true; break;
        case 'ControlLeft': case 'ControlRight': input.crouch=true; break;
        case 'KeyE': input.interact=true; handleInteract(); break;
        case 'KeyF': player.flashlightOn=!player.flashlightOn; if(player.flashlightOn && player.flashBattery<=0) player.flashlightOn=false; break;
        case 'KeyH': if(player.pills>0 && player.health<100){ player.pills--; player.health=Math.min(100,player.health+25); showPrompt('Таблетка принята (+25 HP)'); updateHUD(); } break;
        case 'KeyR': startNewGame(); break;
    }
});
document.addEventListener('keyup', e => {
    switch(e.code){
        case 'KeyW': case 'ArrowUp': input.forward=false; break;
        case 'KeyS': case 'ArrowDown': input.back=false; break;
        case 'KeyA': case 'ArrowLeft': input.left=false; break;
        case 'KeyD': case 'ArrowRight': input.right=false; break;
        case 'ShiftLeft': case 'ShiftRight': input.sprint=false; break;
        case 'ControlLeft': case 'ControlRight': input.crouch=false; break;
    }
});
document.addEventListener('mousemove', e => {
    if(gameState!=='playing') return;
    mouseDX += e.movementX||0;
    mouseDY += e.movementY||0;
});
canvas.addEventListener('click', () => {
    if(gameState==='playing' && document.pointerLockElement!==canvas) canvas.requestPointerLock();
});

function handleInteract(){
    if(player._lookAtDoor && player._lookAtDist<2.5){
        const msg=interactDoor(player._lookAtDoor);
        if(msg) showPrompt(msg);
    }
}

// ==================== МЕНЮ ====================
document.getElementById('btn-new').addEventListener('click', ()=>{ initAudio(); startNewGame(); });
document.getElementById('btn-continue').addEventListener('click', ()=>{
    initAudio();
    if(gameState==='paused'){
        // Возобновление из паузы — без перезагрузки мира
        gameState='playing';
        document.getElementById('menu').style.display='none';
        canvas.requestPointerLock();
    } else {
        // Из главного меню — загружаем сохранение
        startContinue();
    }
});
document.getElementById('btn-settings').addEventListener('click', ()=>{ document.getElementById('settings').style.display='flex'; });
document.getElementById('btn-settings-back').addEventListener('click', ()=>{ document.getElementById('settings').style.display='none'; saveGame(); });
document.getElementById('btn-controls').addEventListener('click', ()=>{ document.getElementById('controls').style.display='flex'; });
document.getElementById('btn-controls-back').addEventListener('click', ()=>{ document.getElementById('controls').style.display='none'; });

document.getElementById('s-sens').addEventListener('input', e=>{ CFG.sens=parseInt(e.target.value); document.getElementById('v-sens').textContent=CFG.sens; });
document.getElementById('s-bright').addEventListener('input', e=>{ CFG.brightness=parseInt(e.target.value)/100; document.getElementById('v-bright').textContent=parseInt(e.target.value)+'%'; });
document.getElementById('s-vol').addEventListener('input', e=>{ CFG.volume=parseInt(e.target.value)/100; document.getElementById('v-vol').textContent=parseInt(e.target.value)+'%'; if(audioNodes.hum)audioNodes.hum.gain.value=0.03*CFG.volume; if(audioNodes.hum2)audioNodes.hum2.gain.value=0.015*CFG.volume; if(audioNodes.vent)audioNodes.vent.gain.value=0.008*CFG.volume; });
document.getElementById('s-scale').addEventListener('input', e=>{ CFG.renderScale=parseInt(e.target.value)/100; document.getElementById('v-scale').textContent=parseInt(e.target.value)+'%'; initRenderer(); });
document.getElementById('s-grain').addEventListener('change', e=>CFG.grain=e.target.checked);
document.getElementById('s-vignette').addEventListener('change', e=>CFG.vignette=e.target.checked);
document.getElementById('s-chroma').addEventListener('change', e=>CFG.chroma=e.target.checked);

document.querySelector('.doc-close').addEventListener('click', ()=>{ document.getElementById('doc-ui').style.display='none'; gameState='playing'; canvas.requestPointerLock(); });
document.querySelectorAll('.choice-btn').forEach(btn=>btn.addEventListener('click', ()=>{
    const ui=document.getElementById('choice-ui');
    const choice=btn.dataset.choice;
    const dk=ui.dataset.door;
    if(dk && choice==='yes'){
        const d=doors.get(dk);
        if(d){ d.opening=true; d.closing=false; d.interacted=true; playSound('alarm_open'); showSubtitle('СИРЕНА! Он услышал...',3000); monster.state='heard'; monster.stateTimer=8; monster.heardPos={x:d.wx,y:d.wy}; }
    }
    ui.style.display='none';
    gameState='playing';
    canvas.requestPointerLock();
}));

// ==================== ЗАПУСК ИГРЫ ====================
function startNewGame(){
    chunks.clear(); doors.clear(); chunkDoorSeeds.clear(); chunkRoomTags.clear();
    chunkLRU.length=0; items.length=0; docReadFlags.clear(); particles.length=0;
    player.x=7.5; player.y=7.5; player.angle=0; player.pitch=0; player.health=100;
    player.batteries=0; player.keys=0; player.pills=0; player.maps=0; player.tools=0;
    player.flashlightOn=true; player.flashBattery=100; player.running=false; player.stamina=1.0; player.crouchLerp=0;
    objectives.docsCollected=0; objectives.genParts=0; objectives.powerOn=false;
    generator.active=false; elevator.finalPhase=false; elevator.timer=0; elevator.active=false;
    monster.x=25; monster.y=25; monster.state='idle'; monster.alertLevel=0; monster.path=null; monster.pathIdx=0;
    monster.canOpenDoors=false; monster.reactsToFlashlight=false; monster.reactsToRunning=false;
    activeTrigger=null; triggerTimer=0; eventCooldown=90+Math.random()*40;
    ensureChunks(player.x,player.y);
    spawnWorldItems();
    placeGeneratorAndElevator();
    updateHUD();
    document.getElementById('menu').style.display='none';
    document.getElementById('settings').style.display='none';
    document.getElementById('controls').style.display='none';
    document.getElementById('hud').style.display='block';
    document.getElementById('hud-health').style.display='block';
    document.getElementById('hud-batt').style.display='block';
    document.getElementById('stamina').style.display='block';
    gameState='playing';
    canvas.requestPointerLock();
    showSubtitle('Уровень B2. Найдите 8 документов, восстановите питание и вызовите лифт.',6000);
    saveGame();
}

function startContinue(){
    // Генерируем мир и предметы ПЕРЕД загрузкой — фикс бага пустого мира
    chunks.clear(); doors.clear(); chunkDoorSeeds.clear(); chunkRoomTags.clear();
    chunkLRU.length=0; particles.length=0;
    // Сначала загрузим сохранение чтобы узнать позицию игрока
    if(!loadGameRaw()){
        startNewGame();
        return;
    }
    ensureChunks(player.x,player.y);
    spawnWorldItems();
    placeGeneratorAndElevator();
    loadGameRaw(); // повторно применить collected-флаги поверх свежего спавна
    document.getElementById('menu').style.display='none';
    document.getElementById('settings').style.display='none';
    document.getElementById('hud').style.display='block';
    document.getElementById('hud-health').style.display='block';
    document.getElementById('hud-batt').style.display='block';
    document.getElementById('stamina').style.display='block';
    gameState='playing';
    canvas.requestPointerLock();
    updateHUD();
}

// ==================== ИГРОВОЙ ЦИКЛ ====================
let lastTime=0, fpsCounter=0, fpsTime=0;
function gameLoop(time){
    requestAnimationFrame(gameLoop);
    const dt=Math.min((time-lastTime)/1000,0.05);
    lastTime=time;
    fpsCounter++; fpsTime+=dt;
    if(fpsTime>=1){ fpsCounter=0; fpsTime=0; }
    if(gameState==='playing'){
        ensureChunks(player.x,player.y);
        updatePlayer(dt);
        updateDoors(dt);
        updateMonster(dt);
        updateEvents(dt);
        updateParticles(dt);
        updateAmbient(dt);
        if(elevator.finalPhase) updateHUD();
    }
    if(gameState==='playing'||gameState==='dead'||gameState==='won'||gameState==='reading'||gameState==='choosing'){
        render();
        updateUI();
    }
}

// ==================== ИНИЦИАЛИЗАЦИЯ ====================
function init(){
    initTextures();
    initRenderer();
    if(hasSave()){
        spawnWorldItems();
        placeGeneratorAndElevator();
        loadGame();
        document.getElementById('btn-continue').style.display='block';
    }
    applySettingsToUI();
    requestAnimationFrame(gameLoop);
}
init();
</script>
